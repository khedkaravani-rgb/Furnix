<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Furnix</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Jost',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
            url("images/hero-image.jpg");
            background-size:cover;
            background-position:center;
        }

        .login-container{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-box{
            width:420px;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(10px);
            border-radius:16px;
            padding:40px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            font-size:2rem;
            font-weight:700;
            margin-bottom:10px;
            color:#000;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:8px;
            outline:none;
            transition:0.3s;
        }

        .input-group input:focus{
            border-color:#c87b3c;
        }

        .options{
            display:flex;
            justify-content:space-between;
            align-items:center;
            margin-bottom:20px;
            font-size:0.9rem;
        }

        .options a{
            color:#c87b3c;
            text-decoration:none;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#c87b3c;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
        }

        .login-btn:hover{
            background:#a85f26;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            color:#555;
        }

        .signup a{
            color:#c87b3c;
            text-decoration:none;
            font-weight:600;
        }

        .note{
            text-align:center;
            margin-top:15px;
            font-size:0.85rem;
            color:#888;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">

        <div class="logo">FURNIX.</div>
        <p class="subtitle">Welcome Back</p>

        <form>
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" placeholder="Enter your email" required>
            </div>

            <div class="input-group">
                <label>Password</label>
                <input type="password" placeholder="Enter your password" required>
            </div>

            <div class="options">
                <label>
                    <input type="checkbox">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>
            </div>

            <button type="submit" class="login-btn">
                Login
            </button>

            <div class="signup">
                Don't have an account?
                <a href="#">Sign Up</a>
            </div>

            <div class="note">
                Authentication functionality coming soon.
            </div>
        </form>

    </div>
</div>

</body>
</html>
