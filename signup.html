<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Furnix</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.0/css/all.min.css">

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Jost',sans-serif;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(rgba(0,0,0,0.45), rgba(0,0,0,0.45)),
            url("images/hero-image.jpg");
            background-size:cover;
            background-position:center;
            padding-top: 0;
        }

        .login-container{
            width:100%;
            display:flex;
            justify-content:center;
            align-items:center;
            padding:20px;
        }

        .login-box{
            width:420px;
            background:rgba(255,255,255,0.95);
            backdrop-filter:blur(10px);
            border-radius:16px;
            padding:40px;
            box-shadow:0 15px 35px rgba(0,0,0,0.2);
        }

        .logo{
            text-align:center;
            font-size:2rem;
            font-weight:700;
            margin-bottom:10px;
            color:#000;
            text-transform: uppercase;
        }

        .subtitle{
            text-align:center;
            color:#666;
            margin-bottom:30px;
        }

        .input-group{
            margin-bottom:18px;
        }

        .input-group label{
            display:block;
            margin-bottom:8px;
            font-weight:500;
        }

        .input-group input{
            width:100%;
            padding:14px;
            border:1px solid #ddd;
            border-radius:8px;
            outline:none;
            transition:0.3s;
            font-family: 'Jost', sans-serif;
        }

        .input-group input:focus{
            border-color:#9b281a;
        }

        .input-hint{
            font-size: 0.78rem;
            color: #888;
            margin-top: 6px;
        }

        .login-btn{
            width:100%;
            padding:14px;
            border:none;
            border-radius:8px;
            background:#9b281a;
            color:white;
            font-size:1rem;
            cursor:pointer;
            transition:0.3s;
            font-family: 'Jost', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 6px;
        }

        .login-btn:hover{
            background:#7a1f14;
        }

        .login-btn:disabled{
            opacity: 0.6;
            cursor: not-allowed;
        }

        .divider{
            display:flex;
            align-items:center;
            gap: 12px;
            margin: 22px 0;
            color: #999;
            font-size: 0.85rem;
        }

        .divider::before, .divider::after{
            content: '';
            flex:1;
            height:1px;
            background:#e0e0e0;
        }

        .google-btn{
            width:100%;
            padding:12px;
            border:1px solid #ddd;
            border-radius:8px;
            background:#fff;
            color:#333;
            font-size:0.95rem;
            cursor:pointer;
            transition:0.3s;
            display:flex;
            align-items:center;
            justify-content:center;
            gap:10px;
            font-family:'Jost', sans-serif;
        }

        .google-btn:hover{
            background:#f7f7f7;
            border-color:#c7c7c7;
        }

        .signup{
            text-align:center;
            margin-top:20px;
            color:#555;
        }

        .signup a{
            color:#9b281a;
            text-decoration:none;
            font-weight:600;
        }

        .form-message{
            display:none;
            padding: 10px 14px;
            border-radius: 8px;
            font-size: 0.88rem;
            margin-bottom: 16px;
        }

        .form-message.error{
            display:block;
            background:#fdecea;
            color:#9b281a;
            border:1px solid #f3c7c1;
        }

        .form-message.success{
            display:block;
            background:#eaf7ea;
            color:#256029;
            border:1px solid #c3e6cb;
        }
    </style>
</head>
<body>

<div class="login-container">
    <div class="login-box">

        <div class="logo">FURNIX.</div>
        <p class="subtitle">Create Your Account</p>

        <div id="formMessage" class="form-message"></div>

        <form id="signupForm">
            <div class="input-group">
                <label for="signupName">Full Name</label>
                <input type="text" id="signupName" placeholder="Enter your name" required autocomplete="name">
            </div>

            <div class="input-group">
                <label for="signupEmail">Email Address</label>
                <input type="email" id="signupEmail" placeholder="Enter your email" required autocomplete="email">
            </div>

            <div class="input-group">
                <label for="signupPassword">Password</label>
                <input type="password" id="signupPassword" placeholder="Create a password" required autocomplete="new-password" minlength="6">
                <p class="input-hint">At least 6 characters.</p>
            </div>

            <button type="submit" class="login-btn" id="signupSubmitBtn">
                Create Account
            </button>

            <div class="divider">or</div>

            <button type="button" class="google-btn" id="googleSignUpBtn">
                <i class="fa-brands fa-google" style="color:#DB4437;"></i>
                Continue with Google
            </button>

            <div class="signup">
                Already have an account?
                <a href="login.html">Login</a>
            </div>
        </form>

    </div>
</div>

<script type="module" src="signup-auth.js"></script>

</body>
</html>
